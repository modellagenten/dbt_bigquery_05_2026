version: 2

models:
  - name: dim_users
    description: "Kund:innen-Dimension mit Bestell-Summary aus abgeschlossenen Bestellungen."
    columns:
      - name: user_id
        description: "Primärschlüssel der Kund:innen-Dimension."
        tests:
          - unique
          - not_null
      - name: email
        description: "E-Mail-Adresse der Kund:in (fachliche Pflicht)."
        tests:
          - not_null
      - name: lifetime_orders
        description: "Anzahl abgeschlossener Bestellungen (`status = 'Complete'`)."
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
      - name: lifetime_items
        description: "Summe aller bestellten Artikel über abgeschlossene Bestellungen."
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

  - name: dim_products
    description: "Produkt-Dimension mit Stammdaten und Verkaufs-Kennzahlen über die gesamte Historie."
    columns:
      - name: product_id
        description: "Primärschlüssel der Produkt-Dimension."
        tests:
          - unique
          - not_null
      - name: category
        description: "Produktkategorie (z. B. 'Accessories', 'Tops & Tees')."
        tests:
          - not_null
      - name: lifetime_units_sold
        description: "Anzahl verkaufter Einheiten über alle Bestellpositionen."
      - name: lifetime_revenue
        description: "{{ doc('revenue_definition') }}"
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

  - name: fct_orders
    description: "Eine Zeile pro Bestellung mit Revenue-, Profit- und Delivery-Kennzahlen."
    columns:
      - name: order_id
        description: "Primärschlüssel der Bestellung."
        tests:
          - unique
          - not_null
      - name: user_id
        description: "Foreign Key auf `dim_users`."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_users')
                field: user_id
      - name: status
        description: "{{ doc('order_status') }}"
        tests:
          - accepted_values:
              arguments:
                values: ['Complete', 'Processing', 'Shipped', 'Cancelled', 'Returned']
      - name: ordered_at
        description: "Zeitpunkt der Bestellung (Timestamp)."
        tests:
          - not_null
          - not_future
      - name: revenue
        description: "{{ doc('revenue_definition') }}"
        tests:
          - dbt_utils.expression_is_true:
              arguments: 
                expression: ">= 0"
      - name: days_to_delivery
        description: "Anzahl Tage zwischen Bestell- und Liefer-Zeitpunkt. NULL, solange nicht geliefert."

  - name: fct_order_items
    description: "Eine Zeile pro Bestellposition, angereichert um Produkt-Infos (aus `int_order_items_enriched`)."
    columns:
      - name: order_item_id
        description: "Primärschlüssel der Bestellposition."
        tests:
          - unique
          - not_null
      - name: order_id
        description: "Foreign Key auf `fct_orders`."
        tests:
          - not_null
          - relationships:
              arguments: 
                to: ref('fct_orders')
                field: order_id
      - name: product_id
        description: "Foreign Key auf `dim_products`."
        tests:
          - not_null
          - relationships:
              arguments: 
                to: ref('dim_products')
                field: product_id
      - name: sale_price
        description: "{{ doc('revenue_definition') }}"
        tests:
          - dbt_utils.expression_is_true:
              arguments: 
                expression: ">= 0"

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments: 
            combination_of_columns:
              - order_id
              - order_item_id